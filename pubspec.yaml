name: fitiq
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  dio: ^5.9.2

  # ── Riverpod v3 family ────────────────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2 # must match riverpod_generator ^4.x

  # ── Freezed v3 family ─────────────────────────────────────────────────────
  freezed_annotation: ^3.1.0 # must match freezed ^3.x
  json_annotation: ^4.11.0

  # ── Other runtime deps ────────────────────────────────────────────────────
  shared_preferences: ^2.5.5
  go_router: ^17.1.0
  fluttertoast: ^8.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^10.0.0
  collection: ^1.19.1
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  video_player: ^2.11.1
  better_player_plus: ^1.1.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5 # generates .freezed.dart  (matches freezed_annotation ^3.x)
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.0 # generates .g.dart        (matches riverpod_annotation ^4.x)
  json_serializable: ^6.8.0 # generates .g.dart        (matches json_annotation ^4.x)

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo512.png"

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Oswald-Light.ttf
          weight: 300
        - asset: assets/fonts/Oswald-Regular.ttf
          weight: 400
        - asset: assets/fonts/Oswald-Medium.ttf
          weight: 500
        - asset: assets/fonts/Oswald-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Oswald-Bold.ttf
          weight: 700

    - family: Lato
      fonts:
        - asset: assets/fonts/Lato/Lato-Thin.ttf
          weight: 100
        - asset: assets/fonts/Lato/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/Lato/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lato/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato/Lato-Black.ttf
          weight: 900
        - asset: assets/fonts/Lato/Lato-Italic.ttf
          style: italic
          weight: 400
        - asset: assets/fonts/Lato/Lato-LightItalic.ttf
          style: italic
          weight: 300
        - asset: assets/fonts/Lato/Lato-BoldItalic.ttf
          style: italic
          weight: 700
        - asset: assets/fonts/Lato/Lato-BlackItalic.ttf
          style: italic
          weight: 900
